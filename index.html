<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Notation Web Applet</title>
  
  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar (purely inserted; nothing else changed) -->
  <nav>
    <div class="nav-container">
      <!-- Left-aligned brand (two lines) -->
      <div class="brand">
        <p class="small-text">Quinn Fleming's</p>
        <h1>Music Learning Tools</h1>
      </div>

      <!-- Centered links -->
      <ul>
        <li><a href="https://iambored456.github.io/DiatonicCompass/">DiatonicCompass</a></li>
        <li><a href="https://iambored456.github.io/Student-Notation/" class="active">Student-Notation</a></li>
        <li><a href="https://iambored456.github.io/PitchDetect/">PitchDetect</a></li>
      </ul>

      <!-- Right column is empty for now (can be used for future items) -->
      <div></div>
    </div>
  </nav>

  <div id="app-container">

    <!-- Toolbar -->
    <div id="toolbar">

      <!-- Title Section -->
      <div id="title-section">
        <input type="text" id="title-input" value="Student Notation by Quinn Fleming" aria-label="Title Text" />
        <div id="export-import-buttons">
          <button class="toolkit-button" id="export-button">Export</button>
          <button class="toolkit-button" id="import-button">Import</button>
        </div>
      </div>

      <!-- Waveform + Sliders + ADSR Section -->
      <div id="waveform-sliders-adsr-section">

        <div id="waveform-section">
          <div id="preset-buttons">
            <button class="preset-button" id="preset-sine">Sine</button>
            <button class="preset-button" id="preset-triangle">Triangle</button>
            <button class="preset-button" id="preset-square">Square</button>
            <button class="preset-button" id="preset-sawtooth">Sawtooth</button>
          </div>
        </div>

        <div id="harmonic-sliders-container">
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-9" aria-label="Harmonic 9">
            <div class="slider-label">H9</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-8" aria-label="Harmonic 8">
            <div class="slider-label">H8</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-7" aria-label="Harmonic 7">
            <div class="slider-label">H7</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-6" aria-label="Harmonic 6">
            <div class="slider-label">H6</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-5" aria-label="Harmonic 5">
            <div class="slider-label">H5</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-4" aria-label="Harmonic 4">
            <div class="slider-label">H4</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-3" aria-label="Harmonic 3">
            <div class="slider-label">H3</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-2" aria-label="Harmonic 2">
            <div class="slider-label">H2</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="0" class="harmonic-slider" id="harmonic-1" aria-label="Harmonic 1">
            <div class="slider-label">H1</div>
          </div>
          <div class="slider-wrapper">
            <input type="range" min="0" max="1" step="0.001" value="1" class="harmonic-slider" id="harmonic-0" aria-label="Harmonic 0">
            <div class="slider-label">H0</div>
          </div>
        </div>

        <div id="adsr-container">
          <div class="adsr-wrapper">
            <label for="attack-slider" class="slider-label">Attack</label>
            <input type="range" id="attack-slider" min="0" max="2" value="0.1" step="0.01">
          </div>
          <div class="adsr-wrapper">
            <label for="decay-slider" class="slider-label">Decay</label>
            <input type="range" id="decay-slider" min="0" max="2" value="0.2" step="0.01">
          </div>
          <div class="adsr-wrapper">
            <label for="sustain-slider" class="slider-label">Sustain</label>
            <input type="range" id="sustain-slider" min="0" max="1" value="0.8" step="0.01">
          </div>
          <div class="adsr-wrapper">
            <label for="release-slider" class="slider-label">Release</label>
            <input type="range" id="release-slider" min="0" max="2" value="0.3" step="0.01">
          </div>
        </div>
        <!-- ADSR Diagram Container -->
        <div id="adsr-diagram-container">
          <svg id="adsr-svg" width="400" height="150" aria-label="ADSR Diagram">
            <!-- We'll draw three line segments: Attack -> Decay/Sustain -> Release -->
            <path id="adsr-path" class="adsr-line" d="M0,130 L60,20 L100,60 L180,130" />

            <!-- Attack Node -->
            <circle id="attack-node" class="adsr-node" cx="60" cy="20" r="5" />

            <!-- Decay/Sustain Node -->
            <circle id="decay-sustain-node" class="adsr-node" cx="100" cy="60" r="5" />

            <!-- Release Node -->
            <circle id="release-node" class="adsr-node" cx="180" cy="130" r="5" />
          </svg>
        </div>

      </div>

      <!-- Notes Container and Eraser -->
      <div id="notes-container">
        <div class="note" data-color="#000000" style="background-color: #000000;" tabindex="0" aria-label="Black Note"></div>
        <div class="note" data-color="#ff0000" style="background-color: #ff0000;" tabindex="0" aria-label="Red Note"></div>
        <div class="note" data-color="#0000ff" style="background-color: #0000ff;" tabindex="0" aria-label="Blue Note"></div>
        <div class="eraser" id="eraser-tool" tabindex="0" aria-label="Eraser Tool">🩹</div>
      </div>

      <!-- Shift Grid Buttons -->
      <div id="shift-grid-buttons">
        <button class="toolkit-button" id="shift-up-button" aria-label="Shift Grid Up">▲</button>
        <button class="toolkit-button" id="shift-down-button" aria-label="Shift Grid Down">▼</button>
      </div>

    </div>

    <!-- Notation Grid -->
    <div id="grid-container" aria-label="Notation Grid">
      <canvas id="notation-grid" role="img" aria-label="Musical Notation Grid" tabindex="0"></canvas>
    </div>

    <!-- Playback and Control Buttons -->
    <div id="controls" aria-label="Control Buttons">
      <div id="volume-container">
        <div class="volume-labels">
          <span>0</span>
          <span>50</span>
          <span>100</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="100" step="1" aria-label="Volume Slider">
        <div class="slider-label">Volume</div>
      </div>

      <button id="play-button" aria-label="Play Music">Play</button>
      <button id="stop-button" aria-label="Stop Music">Stop</button>
      <button id="clear-button" aria-label="Clear Notes">Clear</button>

      <div id="tempo-container">
        <div class="tempo-labels">
          <span>60</span>
          <span>90</span>
          <span>120</span>
          <span>150</span>
          <span>180</span>
        </div>
        <input type="range" id="tempo-slider" min="60" max="180" value="120" step="1" aria-label="Tempo Slider">
        <div class="slider-label">Tempo</div>
      </div>
    </div>
  </div>
