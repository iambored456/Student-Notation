<!DOCTYPE html>
<html>
<head>
  <title>Student Notation Web Applet</title>
  <style>
    /* Reset and basic styles */
    body, html {
      margin: 10px;
      padding: 0;
      height: calc(100% - 20px);
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #app-container {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 20px); /* Use viewport height minus margins */
      width: calc(100vw - 20px);  /* Use viewport width minus margins */
      box-sizing: border-box;
    }

    /* Note Bank Styles */
    #note-bank {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      background-color: #f0f0f0;
      flex: 0 0 auto; /* Make height variable */
    }

    .note {
      width: 30px;
      height: 30px;
      background-color: #000; /* Default to black for the main melody */
      border: 2px solid #000;
      border-radius: 50%;
      margin: 0 5px;
      cursor: grab;
    }

    /* Grid Container */
    #grid-container {
      position: relative;
      flex: 1; /* Allow grid to take up remaining space */
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #notation-grid {
      display: block;
      width: 100%; /* Set width to 100% of the container */
      height: 100%; /* Set height to match the container height */
      margin: 0 auto; /* Center the canvas horizontally */
      background-color: #fff; /* Optional: White background for better visibility */
    }

    /* Controls */
    #controls {
      display: flex;
      justify-content: center;
      padding: 10px; /* Reduced padding for smaller space */
      background-color: #f0f0f0;
      flex: 0 0 auto; /* Make height variable */
    }

    #controls button {
      margin: 0 10px;
      padding: 15px 30px; /* Increased padding for larger buttons */
      font-size: 16px; /* Increased font size */
      background-color: #000; /* Black background */
      color: #fff; /* White text */
      border: none;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    #controls button:hover {
      opacity: 0.8;
    }

    /* Optional: Visual feedback during dragging */
    #notation-grid.drag-over {
      border: 2px dashed #000;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <!-- Note Bank -->
    <div id="note-bank">
      <div class="note" draggable="true" data-color="#000"></div>
      <div class="note" draggable="true" data-color="#ff0000" style="background-color: #ff0000;"></div>
      <div class="note" draggable="true" data-color="#0000ff" style="background-color: #0000ff;"></div>
      <!-- Add more note circles with different colors if needed -->
    </div>

    <!-- Grid Container -->
    <div id="grid-container">
      <canvas id="notation-grid"></canvas>
    </div>

    <!-- Control Buttons -->
    <div id="controls">
      <button id="play-button">Play</button>
      <button id="stop-button">Stop</button>
      <button id="clear-button">Clear</button>
    </div>
  </div>

  <script>
    // Initialize canvas and context
    const canvas = document.getElementById('notation-grid');
    const ctx = canvas.getContext('2d');

    // Grid parameters
    const logicRows = 20; // Each logic row represents a pitch
    const visualRows = 10; // Represents the 5-line staff with spaces in between

    let cellWidth, cellHeight;

    // Define column widths in units
    const columnWidths = [
      32, // Column A (Left)
      32, // Column B (Left)
      72, // Column C (anacrusis/pickup bar)
      // Main grid columns (D to AI)
      ...Array(32).fill(10), // Columns D to AI
      32, // Column B (Right)
      32  // Column A (Right)
    ];

    // Calculate total columns
    const totalColumns = columnWidths.length;

    // Map grid rows to pitches and specify column ('A' or 'B')
    const rowData = [
      // Row 0 starts at the top
      { pitch: 'Ab/G#', frequency: 830.61, color: null, column: 'A' },     // Row 0
      { pitch: 'G5', frequency: 783.99, color: '#78d9f7', column: 'B' },   // Row 1
      { pitch: 'Gb/F#', frequency: 739.99, color: null, column: 'A' },     // Row 2
      { pitch: 'F5', frequency: 698.46, color: '#9ef777', column: 'B' },   // Row 3
      { pitch: 'E5', frequency: 659.25, color: '#fcfc74', column: 'A' },   // Row 4
      { pitch: 'Eb/D#', frequency: 622.25, color: null, column: 'B' },     // Row 5
      { pitch: 'D5', frequency: 587.33, color: '#ffc076', column: 'A' },   // Row 6
      { pitch: 'Db/C#', frequency: 554.37, color: null, column: 'B' },     // Row 7
      { pitch: 'C5', frequency: 523.25, color: '#f77878', column: 'A' },   // Row 8
      { pitch: 'B4', frequency: 493.88, color: '#f778e0', column: 'B' },   // Row 9
      { pitch: 'Bb/A#', frequency: 466.16, color: null, column: 'A' },     // Row 10
      { pitch: 'A4', frequency: 440.00, color: '#b288ff', column: 'B' },   // Row 11
      { pitch: 'Ab/G#', frequency: 415.30, color: null, column: 'A' },     // Row 12
      { pitch: 'G4', frequency: 392.00, color: '#78d9f7', column: 'B' },   // Row 13
      { pitch: 'Gb/F#', frequency: 369.99, color: null, column: 'A' },     // Row 14
      { pitch: 'F4', frequency: 349.23, color: '#9ef777', column: 'B' },   // Row 15
      { pitch: 'E4', frequency: 329.63, color: '#fcfc74', column: 'A' },   // Row 16
      { pitch: 'Eb/D#', frequency: 311.13, color: null, column: 'B' },     // Row 17
      { pitch: 'D4', frequency: 293.66, color: '#ffc076', column: 'A' },   // Row 18
      { pitch: 'Db/C#', frequency: 277.18, color: null, column: 'B' }      // Row 19
    ];

    // Store placed notes
    const placedNotes = [];

    // Audio context for playback
    let AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = new AudioContext();

    // Responsive canvas resizing with debouncing
    let resizeTimeout;
    function resizeCanvas() {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        const parentWidth = canvas.parentElement.offsetWidth;
        const parentHeight = canvas.parentElement.offsetHeight;

        // Set canvas dimensions based on container dimensions
        canvas.width = parentWidth;
        canvas.height = parentHeight;

        // Calculate total width in units
        const totalWidthUnits = columnWidths.reduce((a, b) => a + b, 0);

        // Calculate unit sizes based on canvas dimensions
        const unitWidthSize = canvas.width / totalWidthUnits;

        // Calculate cell dimensions
        cellWidth = unitWidthSize * 10; // Adjust if necessary
        cellHeight = canvas.height / visualRows;

        drawGrid();
        redrawNotes();
      }, 200); // Debounce delay
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Function to get X position of a column index
    function getColumnX(index) {
      let x = 0;
      for (let i = 0; i < index; i++) {
        x += columnWidths[i] * (canvas.width / columnWidths.reduce((a, b) => a + b, 0));
      }
      return x;
    }

    // Function to get column index from X position
    function getColumnIndex(x) {
      let cumulativeWidth = 0;
      for (let i = 0; i < columnWidths.length; i++) {
        cumulativeWidth += columnWidths[i] * (canvas.width / columnWidths.reduce((a, b) => a + b, 0));
        if (x < cumulativeWidth) {
          return i;
        }
      }
      return columnWidths.length - 1;
    }

    // Function to get Y position of a logic row index
    function getRowY(index) {
      return (index * 0.5) * cellHeight;
    }

    // Function to get logic row index from Y position
    function getRowIndex(y) {
      return Math.floor((y / canvas.height) * logicRows);
    }

    // Draw the grid with labels and markers
    function drawGrid() {
      // Clear the canvas
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Calculate total width and height in units
      const totalWidthUnits = columnWidths.reduce((a, b) => a + b, 0);
      const totalHeight = canvas.height; // Since visualRows = 10

      // Draw horizontal lines (for 10 lines)
      for (let i = 0; i <= visualRows; i++) {
        const y = i * cellHeight;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);

        ctx.strokeStyle = '#000';
        ctx.setLineDash([]);
        ctx.lineWidth = 1;

        ctx.stroke();
      }

      // Draw vertical lines
      let x = 0;
      for (let i = 0; i <= totalColumns; i++) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, totalHeight);

        if (i >= 2 && i <= totalColumns - 2) { // Main grid area
          const gridColumn = i - 2; // Adjust for legend columns
          if (i === 2 || i === 3) {
            // Column C (anacrusis/pickup bar)
            ctx.strokeStyle = '#000';
            ctx.setLineDash([]);
            ctx.lineWidth = 1;
          } else if ((gridColumn - 1) % 2 === 0) {
            ctx.strokeStyle = '#000'; // Solid line for full beats
            ctx.setLineDash([]);
            ctx.lineWidth = 1;
          } else {
            ctx.strokeStyle = '#888'; // Dotted line for subdivisions
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
          }
        } else {
          ctx.strokeStyle = '#ccc';
          ctx.setLineDash([]);
          ctx.lineWidth = 1;
        }

        ctx.stroke();
        x += columnWidths[i] * (canvas.width / columnWidths.reduce((a, b) => a + b, 0));
      }

      // Draw legends
      drawLegend(0, 2, false, ['A', 'B']); // Left legend columns A and B
      drawLegend(totalColumns - 2, totalColumns, true, ['B', 'A']); // Right legend columns B and A
    }

    // Function to draw legends
    function drawLegend(startColumnIndex, endColumnIndex, isRightSide = false, columnsOrder = ['A', 'B']) {
        const xStart = getColumnX(startColumnIndex);
        const columnWidthsPx = columnWidths.slice(startColumnIndex, endColumnIndex).map(widthUnit => 
            widthUnit * (canvas.width / columnWidths.reduce((a, b) => a + b, 0)));

        let cumulativeX = xStart;
        for (let col = 0; col < columnsOrder.length; col++) {
            const columnLabel = columnsOrder[col];
            const colWidth = columnWidthsPx[col];

            for (let i = 0; i < logicRows; i++) {
                const isLine = i % 2 === 0; // Even rows on lines, odd on spaces
                const y = getRowY(i);

                const row = rowData[i];

                if (row.column === columnLabel) {
                    const color = row.color || '#fff'; // Use white if no color
                    let pitchName = row.pitch;

                    // Adjust y position for 'A' columns
                    const yOffset = columnLabel === 'A' ? -cellHeight / 2 : 0;
                    
                    // Draw background for the label
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        cumulativeX, 
                        y - (isLine ? 0 : cellHeight / 2) + yOffset, 
                        colWidth, 
                        cellHeight
                    );

                    // Draw the pitch label
                    ctx.fillStyle = '#000';
                    ctx.font = `${Math.max(10, cellHeight * 0.6)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(
                        pitchName,
                        cumulativeX + colWidth / 2,
                        y - (isLine ? 0 : cellHeight / 2) + cellHeight / 2 + yOffset
                    );
                }
            }
            cumulativeX += colWidth;
        }
    }

    // Handle dragging notes from the note bank
    const notes = document.querySelectorAll('.note');
    notes.forEach(note => {
      note.addEventListener('dragstart', dragStart);
    });

    function dragStart(event) {
      const color = event.target.getAttribute('data-color');
      event.dataTransfer.setData('text/plain', color);
    }

    // Handle drop events on the canvas
    canvas.addEventListener('dragover', dragOverCanvas);
    canvas.addEventListener('drop', dropOnCanvas);

    function dragOverCanvas(event) {
      event.preventDefault();
    }

    function dropOnCanvas(event) {
      event.preventDefault();

      // Get mouse position relative to the canvas
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      // Get column index
      let columnIndex = getColumnIndex(x);

      // Adjust for legend columns
      if (columnIndex < 2 || columnIndex >= totalColumns - 2) {
        alert('Cannot place note outside the main grid!');
        return; // Outside main grid
      }

      // Snap to nearest column
      const columnX = getColumnX(Math.floor(columnIndex));
      const nextColumnX = getColumnX(Math.floor(columnIndex) + 1);
      const columnMidpoint = (columnX + nextColumnX) / 2;
      if (x > columnMidpoint) {
        columnIndex = Math.ceil(columnIndex);
      } else {
        columnIndex = Math.floor(columnIndex);
      }

      // Get logic row index using the updated cellHeight
      const row = Math.min(logicRows - 1, Math.floor((y / canvas.height) * logicRows));

      // Ensure row is within bounds
      if (row < 0 || row >= logicRows) {
        alert('Cannot place note outside the grid!');
        return;
      }

      // Get the color from the dragged note
      const color = event.dataTransfer.getData('text/plain') || '#000';

      // Place the note at the snapped position
      placeNoteAt(row, columnIndex, color);
      drawGrid();
      redrawNotes();
    }

    // Function to place note data
    function placeNoteAt(row, columnIndex, color) {
      // Check if a note already exists at this position
      const existingNoteIndex = placedNotes.findIndex(note => note.row === row && note.columnIndex === columnIndex);
      if (existingNoteIndex === -1) {
        // Add new note
        placedNotes.push({ row, columnIndex, color });
      } else {
        // Remove existing note (toggle off)
        placedNotes.splice(existingNoteIndex, 1);
      }
    }

    // Redraw all placed notes
    function redrawNotes() {
      placedNotes.forEach(note => {
        drawNoteOnCanvas(note.row, note.columnIndex, note.color);
      });
    }

    // Function to draw a note on the canvas
    function drawNoteOnCanvas(row, columnIndex, color) {
      const x = getColumnX(Math.floor(columnIndex));
      const nextX = getColumnX(Math.floor(columnIndex) + 1);
      // Position notes at 0.5 increments
      const xPos = x + ((columnIndex % 1) * (nextX - x));

      const y = getRowY(row);
      const radius = Math.min(nextX - x, cellHeight) / 2 - 2;

      ctx.beginPath();
      ctx.arc(x + (nextX - x) / 2, y, radius, 0, 2 * Math.PI); // Adjust Y position to align with lines/spaces
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Playback functionality
    document.getElementById('play-button').addEventListener('click', playMusic);

    function playMusic() {
      // Check if audio context is in suspended state (autoplay policy)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const beatDuration = 0.5; // Duration of one beat in seconds
      const unitDuration = beatDuration / logicRows; // Adjust based on logicRows

      placedNotes.forEach(note => {
        const columnIndex = note.columnIndex;

        // Calculate cumulative units up to the note (excluding legends)
        let cumulativeUnits = 0;
        for (let i = 2; i < Math.floor(columnIndex); i++) {
          cumulativeUnits += columnWidths[i];
        }
        // Add fractional part
        cumulativeUnits += (columnIndex % 1) * columnWidths[Math.floor(columnIndex)];

        // Calculate start time
        const startTime = audioCtx.currentTime + cumulativeUnits * unitDuration;

        const rowInfo = rowData[note.row];
        const frequency = rowInfo.frequency;

        if (frequency) {
          playNoteAtTime(frequency, startTime, beatDuration / 2);
        }
      });
    }

    function playNoteAtTime(frequency, time, duration) {
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(frequency, time);

      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      oscillator.start(time);
      oscillator.stop(time + duration);

      // Fade out the note
      gainNode.gain.setValueAtTime(1, time);
      gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration);
    }

    // Stop functionality
    document.getElementById('stop-button').addEventListener('click', stopMusic);

    function stopMusic() {
      if (audioCtx.state !== 'closed' && audioCtx.state !== 'suspended') {
        audioCtx.suspend();
      }
    }

    // Resume audio context on user interaction
    document.addEventListener('click', () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    });

    // Clear functionality
    document.getElementById('clear-button').addEventListener('click', clearNotes);

    function clearNotes() {
        placedNotes.length = 0; // Clear the array
        localStorage.removeItem('placedNotes'); // Remove from localStorage
        drawGrid(); // Redraw the empty grid
    }

    // Optional: Visual feedback during dragging
    canvas.addEventListener('dragenter', () => {
      canvas.classList.add('drag-over');
    });

    canvas.addEventListener('dragleave', () => {
      canvas.classList.remove('drag-over');
    });

    canvas.addEventListener('drop', () => {
      canvas.classList.remove('drag-over');
    });

    // Optional: Saving and Loading Notes (Using localStorage)
    // Save notes before unloading the page
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('placedNotes', JSON.stringify(placedNotes));
    });

    // Load notes when the page loads
    window.addEventListener('load', () => {
        // Clear any existing notes
        placedNotes.length = 0;
        localStorage.removeItem('placedNotes');
        drawGrid();
    });
  </script>
</body>
</html>
